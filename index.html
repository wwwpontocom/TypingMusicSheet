<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sheet Music Generator</title>
    <script src="https://cdn.jsdelivr.net/npm/vexflow@4.2.2/build/cjs/vexflow.js"></script>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; background-color: #f4f4f9; }
        .controls { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-bottom: 20px; text-align: left; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); max-width: 800px; width: 100%; }
        .controls label { font-weight: bold; display: block; margin-bottom: 5px; }
        textarea#notation { width: 100%; grid-column: span 3; height: 100px; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; font-family: monospace; font-size: 14px; }
        .btn-group { grid-column: span 3; display: flex; gap: 10px; justify-content: center; margin-top: 10px; }
        button { padding: 10px 20px; cursor: pointer; border: none; border-radius: 4px; background: #007bff; color: white; font-weight: bold; transition: background 0.2s; }
        button:hover { background: #0056b3; }
        #printBtn { background: #28a745; }
        #printBtn:hover { background: #218838; }
        #canvas-container { background-color: white; margin-top: 20px; padding: 40px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); overflow-x: auto; max-width: 100%; display: flex; justify-content: center; }
        
        .command-reference { grid-column: span 3; background: #eef2f7; padding: 10px; border-radius: 4px; font-size: 0.85em; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .command-reference code { background: #fff; padding: 2px 4px; border-radius: 3px; border: 1px solid #ddd; }

        @media print {
            .controls, #help-text, h1, .command-reference { display: none; }
            body { background: white; padding: 0; }
            #canvas-container { box-shadow: none; border: none; margin: 0; padding: 0; }
        }
    </style>
</head>
<body>

    <h1>Sheet Music Generator</h1>

    <div class="controls">
        <div>
            <label for="clef">Clef:</label>
            <select id="clef">
                <option value="treble">Treble (G)</option>
                <option value="bass">Bass (F)</option>
            </select>
        </div>
        <div>
            <label for="keySig">Key:</label>
            <select id="keySig">
                <option value="C">C Major</option>
                <option value="G">G Major</option>
                <option value="F">F Major</option>
                <option value="Eb">Eb Major</option>
            </select>
        </div>
        <div>
            <label for="timeSig">Time Signature:</label>
            <input type="text" id="timeSig" value="4/4">
        </div>

        <label for="notation">Notation Data:</label>
        <textarea id="notation">1 C4 q, 1 D4 q, 1 E4 q, 1 F4 q, |, 1 G4 q, 1 A4 q, 1 B4 q, 1 C5 q, |, 1 D5 q, 1 E5 q, 1 F5 q, 1 G5 q, bar.double</textarea>

        <div class="command-reference">
            <div><strong>Notes:</strong> <code>[Count] [Note][Octave] [Duration]</code><br>Ex: <code>1 C4 q</code> (Quarter C4)</div>
            <div><strong>Durations:</strong> <code>w</code>, <code>h</code>, <code>q</code>, <code>8</code>, <code>16</code></div>
            <div><strong>Barlines:</strong> <code>|</code>, <code>bar.double</code>, <code>bar.ritornello</code></div>
            <div><strong>Print:</strong> Ajustado para formato A4 vertical.</div>
        </div>

        <div class="btn-group">
            <button id="renderBtn">Update Sheet</button>
            <button id="printBtn">Print / Save as PDF</button>
        </div>
    </div>

    <div id="canvas-container"></div>

    <script>
        const VF = Vex.Flow;

        function getStemDirection(pitch, octave, clef) {
            const noteNames = ['C', 'D', 'E', 'F', 'G', 'A', 'B'];
            const noteIndex = noteNames.indexOf(pitch[0].toUpperCase());
            const val = (octave * 7) + noteIndex;
            return (clef === 'treble' ? val >= 34 : val >= 22) ? VF.Stem.DOWN : VF.Stem.UP;
        }

        function parseToMeasures(text, clef) {
            const sections = text.split(',');
            const measures = [];
            let currentNotes = [];
            const durationMap = { 'w': 'w', 'h': 'h', 'q': 'q', '8': '8', '16': '16' };

            sections.forEach(item => {
                const clean = item.trim();
                const barTypes = {
                    '|': VF.Barline.type.SINGLE,
                    'bar.single': VF.Barline.type.SINGLE,
                    'bar.double': VF.Barline.type.DOUBLE,
                    'bar.ritornello': VF.Barline.type.REPEAT_END
                };

                if (barTypes[clean]) {
                    measures.push({ notes: currentNotes, barline: barTypes[clean] });
                    currentNotes = [];
                } else {
                    const match = clean.match(/(\d+)\s+([A-Ga-g#b]+\d+)\s+([whq816]+)/);
                    if (match) {
                        const count = parseInt(match[1]);
                        const fullPitch = match[2];
                        const pitchName = fullPitch.match(/[A-Ga-g#b]+/)[0];
                        const octave = parseInt(fullPitch.match(/\d+/)[0]);
                        const dur = durationMap[match[3]] || 'q';
                        const key = fullPitch.replace(/([A-G][#b]?)/i, '$1/');

                        for (let i = 0; i < count; i++) {
                            const note = new VF.StaveNote({ 
                                keys: [key], duration: dur,
                                stem_direction: getStemDirection(pitchName, octave, clef)
                            });
                            if (fullPitch.toLowerCase().includes('#')) note.addModifier(new VF.Accidental('#'), 0);
                            if (fullPitch.toLowerCase().includes('b')) note.addModifier(new VF.Accidental('b'), 0);
                            currentNotes.push(note);
                        }
                    }
                }
            });
            if (currentNotes.length > 0) measures.push({ notes: currentNotes, barline: VF.Barline.type.SINGLE });
            return measures;
        }

        function render() {
            const container = document.getElementById('canvas-container');
            container.innerHTML = ''; 

            const clefValue = document.getElementById('clef').value;
            const keySigValue = document.getElementById('keySig').value;
            const timeSigValue = document.getElementById('timeSig').value;
            const measures = parseToMeasures(document.getElementById('notation').value, clefValue);

            const renderer = new VF.Renderer(container, VF.Renderer.Backends.SVG);
            const pageWidth = 750;
            const measuresPerRow = 3; 
            const measureWidth = (pageWidth - 20) / measuresPerRow;
            
            const rowCount = Math.ceil(measures.length / measuresPerRow);
            renderer.resize(pageWidth, rowCount * 150 + 50);
            const context = renderer.getContext();

            measures.forEach((m, index) => {
                const col = index % measuresPerRow;
                const row = Math.floor(index / measuresPerRow);
                const x = 10 + (col * measureWidth);
                const y = 40 + (row * 150);

                const stave = new VF.Stave(x, y, measureWidth);
                
                // Adiciona Clave, Armadura e Fórmula apenas no início de cada linha
                if (col === 0) {
                    stave.addClef(clefValue).addKeySignature(keySigValue);
                    if (row === 0) stave.addTimeSignature(timeSigValue);
                }

                stave.setEndBarline(m.barline);
                stave.setContext(context).draw();

                if (m.notes.length > 0) {
                    const voice = new VF.Voice({ num_beats: 0, beat_value: 4 }).setStrict(false);
                    voice.addTickables(m.notes);
                    new VF.Formatter().joinVoices([voice]).formatToStave([voice], stave);
                    voice.draw(context, stave);
                }
            });
        }

        document.getElementById('renderBtn').addEventListener('click', render);
        document.getElementById('notation').addEventListener('input', render);
        document.getElementById('clef').addEventListener('change', render);
        document.getElementById('keySig').addEventListener('change', render);
        document.getElementById('timeSig').addEventListener('input', render);
        document.getElementById('printBtn').addEventListener('click', () => window.print());

        window.onload = render;
    </script>
</body>
</html>
