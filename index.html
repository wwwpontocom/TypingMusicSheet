<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sheet Music Generator Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/vexflow@4.2.2/build/cjs/vexflow.js"></script>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; background-color: #f4f4f9; color: #333; }
        .controls { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-bottom: 20px; text-align: left; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); max-width: 800px; width: 100%; }
        .controls label { font-weight: bold; display: block; margin-bottom: 5px; }
        
        /* Novo estilo para o campo de título */
        #musicTitleInput { width: 100%; grid-column: span 3; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; font-size: 16px; margin-bottom: 10px; }
        
        textarea#notation { width: 100%; grid-column: span 3; height: 80px; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; font-family: monospace; font-size: 14px; }
        .btn-group { grid-column: span 3; display: flex; gap: 10px; justify-content: center; margin-top: 10px; flex-wrap: wrap; }
        
        button { padding: 10px 20px; cursor: pointer; border: none; border-radius: 4px; background: #007bff; color: white; font-weight: bold; transition: background 0.2s; }
        button:hover { background: #0056b3; }
        #finalizeBtn { background: #6f42c1; }
        #addStaveBtn { background: #17a2b8; }
        #printBtn { background: #28a745; }
        
        .canvas-section { width: 100%; max-width: 800px; margin-top: 20px; }
        .canvas-label { font-weight: bold; margin-bottom: 10px; color: #666; text-transform: uppercase; font-size: 0.8em; letter-spacing: 1px; }
        
        .sheet-container { background-color: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); overflow: hidden; min-height: 150px; display: flex; flex-direction: column; align-items: center; width: 100%; box-sizing: border-box; }

        /* Estilo do Título na Partitura */
        .render-title { font-size: 24px; font-weight: bold; margin-bottom: 20px; text-align: center; width: 100%; }

        @media print {
            @page { margin: 1cm; }
            .controls, .canvas-label, h1, #preview-section { display: none !important; }
            body { background: white; padding: 0; margin: 0; }
            .canvas-section { margin: 0; padding: 0; width: 100%; max-width: 100%; }
            #final-section { box-shadow: none; border: none; width: 100%; }
            .sheet-container { box-shadow: none; padding: 0; width: 100%; overflow: visible; }
            svg { width: 100% !important; height: auto !important; }
        }
    </style>
</head>
<body>

    <h1>Sheet Music Generator</h1>

    <div class="controls">
        <label for="musicTitleInput">Music Title:</label>
        <input type="text" id="musicTitleInput" placeholder="Enter song title here..." value="My Composition">
        <label><input type="checkbox" id="enableBeams" checked> Enable Beams</label>

        <div>
            <label for="clef">Clef:</label>
            <select id="clef">
                <option value="treble">Treble (G)</option>
                <option value="bass">Bass (F)</option>
            </select>
        </div>
        <div>
            <label for="keySig">Key:</label>
            <select id="keySig">
                <option value="C">C Major</option>
                <option value="G">G Major</option>
                <option value="F">F Major</option>
                <option value="Eb">Eb Major</option>
            </select>
        </div>
        <div>
            <label for="timeSig">Time Signature:</label>
            <input type="text" id="timeSig" value="4/4">
        </div>

        <label for="notation">Notation Data (Edit Mode):</label>
        <textarea id="notation">1 C4 q, 1 D4 q, 1 E4 q, 1 F4 q, 1 G4 q, 1 A4 q, 1 B4 q, 1 C5 q</textarea>

        <div class="btn-group">
            <button id="finalizeBtn">OK - Finalize Sheet</button>
            <button id="addStaveBtn">Add Empty Pentagram</button>
            <button id="printBtn">Print Final Version</button>
            <button id="playBtn" style="background: #ffc107; color: #333;">Play Audio</button>
<button id="downloadAudioBtn" style="background: #6c757d;">Download Audio (WAV)</button>
        </div>
    </div>

    <div class="canvas-section" id="preview-section">
        <div class="canvas-label">Draft Preview</div>
        <div id="preview-container" class="sheet-container"></div>
    </div>

    <div class="canvas-section" id="final-section">
        <div class="canvas-label">Final Sheet (A4 Ready)</div>
        <div id="final-container" class="sheet-container">
            </div>
    </div>

    <script>
        const VF = Vex.Flow;
        let extraStavesCount = 0;
        const A4_WIDTH = 780; 

        function getStemDirection(pitch, octave, clef) {
            const noteNames = ['C', 'D', 'E', 'F', 'G', 'A', 'B'];
            const noteIndex = noteNames.indexOf(pitch[0].toUpperCase());
            const val = (octave * 7) + noteIndex;
            return (clef === 'treble' ? val >= 34 : val >= 22) ? VF.Stem.DOWN : VF.Stem.UP;
        }

        function getDurationValue(dur) {
            const values = { 'w': 4, 'h': 2, 'q': 1, '8': 0.5, '16': 0.25 };
            return values[dur] || 1;
        }

        function parseNotation(text, clef) {
            const sections = text.split(',').filter(s => s.trim() !== "");
            const vexNotes = [];
            const durationMap = { 'w': 'w', 'h': 'h', 'q': 'q', '8': '8', '16': '16' };

            sections.forEach(item => {
                const match = item.trim().match(/(\d+)\s+([A-Ga-g#b]+\d+)\s+([whq816]+)/);
                if (match) {
                    const count = parseInt(match[1]);
                    const fullPitch = match[2];
                    const pitchName = fullPitch.match(/[A-Ga-g#b]+/)[0];
                    const octave = parseInt(fullPitch.match(/\d+/)[0]);
                    const dur = durationMap[match[3]] || 'q';
                    const key = fullPitch.replace(/([A-G][#b]?)/i, '$1/');

                    for (let i = 0; i < count; i++) {
                        const note = new VF.StaveNote({ 
                            keys: [key], duration: dur,
                            stem_direction: getStemDirection(pitchName, octave, clef)
                        });
                        if (fullPitch.includes('#')) note.addModifier(new VF.Accidental('#'), 0);
                        if (fullPitch.toLowerCase().includes('b') && (fullPitch[0].toUpperCase() !== 'B' || fullPitch.toLowerCase().startsWith('bb'))) {
                            note.addModifier(new VF.Accidental('b'), 0);
                        }
                        note.realValue = getDurationValue(dur);
                        vexNotes.push(note);
                    }
                }
            });
            return vexNotes;
        }

       function renderPreview() {
    const container = document.getElementById('preview-container');
    container.innerHTML = '';
    const notes = parseNotation(document.getElementById('notation').value, document.getElementById('clef').value);
    if (notes.length === 0) return;

    const renderer = new VF.Renderer(container, VF.Renderer.Backends.SVG);
    renderer.resize(A4_WIDTH, 150);
    const context = renderer.getContext();
    const stave = new VF.Stave(10, 10, A4_WIDTH - 20).addClef(document.getElementById('clef').value).setContext(context).draw();
    
    const voice = new VF.Voice({ num_beats: 0, beat_value: 4 }).setStrict(false);
    voice.addTickables(notes);
    new VF.Formatter().joinVoices([voice]).formatToStave([voice], stave);
    
    voice.draw(context, stave);
    
    // Optional Beaming
    if (document.getElementById('enableBeams').checked) {
        const beams = VF.Beam.generateBeams(notes);
        beams.forEach(b => b.setContext(context).draw());
    }
}

        function renderFinal() {
    const container = document.getElementById('final-container');
    container.innerHTML = '';
    
    // ... (Keep Title and Time Signature validation logic the same) ...
    const [numBeats, beatValue] = timeSigStr.split('/').map(Number);
    
    // RE-PARSE notation inside renderFinal to ensure fresh Note Objects for the final render
    const allNotes = parseNotation(document.getElementById('notation').value, clefValue);
    
    const measures = [];
    if (allNotes.length > 0) {
        let currentMeasure = [];
        let currentTicks = 0;
        allNotes.forEach((note) => {
            currentMeasure.push(note);
            currentTicks += note.realValue;
            if (currentTicks >= numBeats - 0.01) {
                measures.push(currentMeasure);
                currentMeasure = [];
                currentTicks = 0;
            }
        });
        if (currentMeasure.length > 0) measures.push(currentMeasure);
    }

    const renderer = new VF.Renderer(container, VF.Renderer.Backends.SVG);
    const measuresPerLine = 2; // Reduced to 2 per line to give 16th notes more room
    const contentLines = Math.ceil(measures.length / measuresPerLine);
    const totalLines = contentLines + extraStavesCount;
    const mWidth = Math.floor((A4_WIDTH - 40) / measuresPerLine); 
    
    renderer.resize(A4_WIDTH, Math.max(totalLines * 160 + 50, 200));
    const context = renderer.getContext();

    for (let i = 0; i < contentLines; i++) {
        const lineMeasures = measures.slice(i * measuresPerLine, (i + 1) * measuresPerLine);
        const y = 20 + (i * 160);

        lineMeasures.forEach((mNotes, mIdx) => {
            const stave = new VF.Stave(20 + (mIdx * mWidth), y, mWidth);
            if (mIdx === 0) stave.addClef(clefValue).addKeySignature(keySig);
            if (i === 0 && mIdx === 0) stave.addTimeSignature(timeSigStr);
            stave.setContext(context).draw();
            
            const voice = new VF.Voice({ num_beats: numBeats, beat_value: beatValue }).setStrict(false);
            voice.addTickables(mNotes);
            
            // Format each measure individually
            new VF.Formatter().joinVoices([voice]).formatToStave([voice], stave);
            voice.draw(context, stave);
            
            // Optional Beaming
            if (document.getElementById('enableBeams').checked) {
                const beams = VF.Beam.generateBeams(mNotes);
                beams.forEach(b => b.setContext(context).draw());
            }
        });
    }

            // Renderiza pentagramas vazios (extras ou se não houver notas)
            const startEmptyAt = contentLines;
            for (let i = startEmptyAt; i < totalLines; i++) {
                const y = 20 + (i * 160);
                const fullStave = new VF.Stave(20, y, A4_WIDTH - 40);
                fullStave.addClef(clefValue).addKeySignature(keySig);
                if (i === 0) fullStave.addTimeSignature(timeSigStr);
                fullStave.setContext(context).draw();
            }
        }

        // --- LISTENERS PARA ATUALIZAÇÃO AUTOMÁTICA ---
        
        const autoUpdateElements = ['notation', 'clef', 'keySig', 'timeSig', 'musicTitleInput'];
        
        autoUpdateElements.forEach(id => {
            document.getElementById(id).addEventListener('input', () => {
                renderPreview();
                renderFinal();
            });
        });

        // O botão "Finalize" agora funciona como um "Reset" de pentagramas extras e refresh manual
        document.getElementById('finalizeBtn').addEventListener('click', () => {
            extraStavesCount = 0;
            renderFinal();
        });
        
        document.getElementById('addStaveBtn').addEventListener('click', () => {
            extraStavesCount++;
            renderFinal();
        });

        document.getElementById('printBtn').addEventListener('click', () => {
            window.print();
        });

        // Inicialização completa no carregamento
        window.onload = () => {
            renderPreview();
            renderFinal();
        };



      // --- LÓGICA DE ÁUDIO ---

    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    // Mapeamento de quais notas recebem sustenido/bemol em cada escala
    const keyMaps = {
        'C': {},
        'G': { 'F': 'F#' },
        'F': { 'B': 'Bb' },
        'Eb': { 'B': 'Bb', 'E': 'Eb', 'A': 'Ab' }
    };

    function getFrequency(noteStr) {
        const notes = { 'C': 0, 'C#': 1, 'Db': 1, 'D': 2, 'D#': 3, 'Eb': 3, 'E': 4, 'F': 5, 'F#': 6, 'Gb': 6, 'G': 7, 'G#': 8, 'Ab': 8, 'A': 9, 'A#': 10, 'Bb': 10, 'B': 11 };
        
        // 1. Identifica a nota e a oitava
        const match = noteStr.match(/([A-G][#b]?)(\d)/i);
        if (!match) return 440;

        let name = match[1].toUpperCase();
        const octave = parseInt(match[2]);
        const currentKey = document.getElementById('keySig').value;

        // 2. APLICA A ARMADURA DE CLAVE: 
        // Se a nota for simples (ex: "F") e a escala pedir alteração (ex: "F#"), ajustamos o nome.
        if (name.length === 1 && keyMaps[currentKey] && keyMaps[currentKey][name]) {
            name = keyMaps[currentKey][name];
        }

        const semitones = notes[name] + (octave - 4) * 12;
        return 440 * Math.pow(2, (semitones - 9) / 12);
    }

    async function generateAudio(isDownload = false) {
        const notationText = document.getElementById('notation').value;
        const sections = notationText.split(',').filter(s => s.trim() !== "");
        const playbackNotes = [];

        // Parse simples para áudio
        sections.forEach(item => {
            const match = item.trim().match(/(\d+)\s+([A-Ga-g#b]+\d+)\s+([whq816]+)/);
            if (match) {
                const count = parseInt(match[1]);
                const pitch = match[2];
                const durChar = match[3];
                const durationSeconds = getDurationValue(durChar) * 0.5; // Ajuste de tempo (0.5s por semínima)
                for (let i = 0; i < count; i++) {
                    playbackNotes.push({ freq: getFrequency(pitch), duration: durationSeconds });
                }
            }
        });

        if (isDownload) {
            return exportWAV(playbackNotes);
        } else {
            playNotes(playbackNotes);
        }
    }

    function playNotes(notes) {
        let currentTime = audioCtx.currentTime;
        notes.forEach(note => {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            
            osc.type = 'triangle'; // Som mais suave que 'sine' para partitura
            osc.frequency.setValueAtTime(note.freq, currentTime);
            
            gain.gain.setValueAtTime(0.2, currentTime);
            gain.gain.exponentialRampToValueAtTime(0.0001, currentTime + note.duration - 0.05);

            osc.connect(gain);
            gain.connect(audioCtx.destination);

            osc.start(currentTime);
            osc.stop(currentTime + note.duration);
            currentTime += note.duration;
        });
    }

    // Função para exportar WAV (simplificada)
    function exportWAV(notes) {
        const sampleRate = 44100;
        const totalDuration = notes.reduce((acc, n) => acc + n.duration, 0);
        const frameCount = sampleRate * totalDuration;
        const buffer = audioCtx.createBuffer(1, frameCount, sampleRate);
        const data = buffer.getChannelData(0);

        let offset = 0;
        notes.forEach(note => {
            const noteFrames = note.duration * sampleRate;
            for (let i = 0; i < noteFrames; i++) {
                // Síntese básica de onda senoidal com fade out
                const sample = Math.sin(2 * Math.PI * note.freq * (i / sampleRate));
                const fade = Math.max(0, 1 - i / noteFrames);
                data[offset + i] = sample * 0.5 * fade;
            }
            offset += noteFrames;
        });

        // Criar Blob WAV
        const wavBuffer = audioBufferToWav(buffer);
        const blob = new Blob([wavBuffer], { type: 'audio/wav' });
        const url = URL.createObjectURL(blob);
        const anchor = document.createElement('a');
        anchor.href = url;
        anchor.download = (document.getElementById('musicTitleInput').value || 'composition') + '.wav';
        anchor.click();
    }

    // Helper para formatar o cabeçalho WAV
    function audioBufferToWav(buffer) {
        let numOfChan = buffer.numberOfChannels,
            length = buffer.length * numOfChan * 2 + 44,
            bufferWav = new ArrayBuffer(length),
            view = new DataView(bufferWav),
            channels = [], i, sample,
            offset = 0,
            pos = 0;

        function setUint16(data) { view.setUint16(pos, data, true); pos += 2; }
        function setUint32(data) { view.setUint32(pos, data, true); pos += 4; }

        setUint32(0x46464952); // "RIFF"
        setUint32(length - 8);
        setUint32(0x45564157); // "WAVE"
        setUint32(0x20746d66); // "fmt "
        setUint32(16);
        setUint16(1);
        setUint16(numOfChan);
        setUint32(buffer.sampleRate);
        setUint32(buffer.sampleRate * 2 * numOfChan);
        setUint16(numOfChan * 2);
        setUint16(16);
        setUint32(0x61746164); // "data"
        setUint32(length - pos - 4);

        for(i=0; i<buffer.numberOfChannels; i++) channels.push(buffer.getChannelData(i));
        while(pos < length) {
            for(i=0; i<numOfChan; i++) {
                sample = Math.max(-1, Math.min(1, channels[i][offset]));
                sample = (sample < 0 ? sample * 0x8000 : sample * 0x7FFF);
                view.setInt16(pos, sample, true);
                pos += 2;
            }
            offset++;
        }
        return bufferWav;
    }

    // Novos Listeners
    document.getElementById('playBtn').addEventListener('click', () => {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        generateAudio(false);
    });

    document.getElementById('downloadAudioBtn').addEventListener('click', () => {
        generateAudio(true);
    });
    </script>
</body>
</html>
