<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sheet Music Generator</title>
    <script src="https://cdn.jsdelivr.net/npm/vexflow@4.2.2/build/cjs/vexflow.js"></script>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; background-color: #f4f4f9; }
        .controls { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-bottom: 20px; text-align: left; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); max-width: 800px; width: 100%; }
        .controls label { font-weight: bold; display: block; margin-bottom: 5px; }
        textarea#notation { width: 100%; grid-column: span 3; height: 100px; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; font-family: monospace; font-size: 14px; resize: vertical; }
        .btn-group { grid-column: span 3; display: flex; gap: 10px; justify-content: center; margin-top: 10px; flex-wrap: wrap; }
        button { padding: 10px 15px; cursor: pointer; border: none; border-radius: 4px; background: #007bff; color: white; font-weight: bold; transition: background 0.2s; }
        button:hover { background: #0056b3; }
        .bar-btn { background: #6c757d; }
        .bar-btn:hover { background: #5a6268; }
        #printBtn { background: #28a745; }
        #printBtn:hover { background: #218838; }
        #canvas-container { background-color: white; margin-top: 20px; padding: 20px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); overflow-x: auto; max-width: 100%; display: flex; justify-content: center; }
        
        .command-reference { grid-column: span 3; background: #eef2f7; padding: 10px; border-radius: 4px; font-size: 0.85em; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .command-reference code { background: #fff; padding: 2px 4px; border-radius: 3px; border: 1px solid #ddd; }

        @media print {
            .controls, #help-text, h1, .command-reference { display: none; }
            body { background: white; padding: 0; }
            #canvas-container { box-shadow: none; border: none; margin: 0; padding: 0; width: 100%; }
        }
    </style>
</head>
<body>

    <h1>Sheet Music Generator</h1>

    <div class="controls">
        <div>
            <label for="clef">Clef:</label>
            <select id="clef">
                <option value="treble">Treble (G)</option>
                <option value="bass">Bass (F)</option>
            </select>
        </div>
        <div>
            <label for="keySig">Key:</label>
            <select id="keySig">
                <option value="C">C Major</option>
                <option value="G">G Major</option>
                <option value="F">F Major</option>
                <option value="Eb">Eb Major</option>
            </select>
        </div>
        <div>
            <label for="timeSig">Time Signature:</label>
            <input type="text" id="timeSig" value="4/4">
        </div>

        <label for="notation">Notation Data:</label>
        <textarea id="notation">1 C4 q, 1 D4 q, 1 E4 q, 1 F4 q, 1 G4 q, 1 A4 q, 1 B4 q, 1 C5 q</textarea>

        <div class="command-reference">
            <div><strong>Notes:</strong> <code>[Count] [Note][Octave] [Duration]</code></div>
            <div><strong>Barlines:</strong> Use buttons to insert <code>|</code> or <code>Double Bar</code>.</div>
        </div>

        <div class="btn-group">
            <button id="addSingleBar" class="bar-btn">Insert Barline ( | )</button>
            <button id="addDoubleBar" class="bar-btn">Insert Double Bar</button>
            <button id="renderBtn">Update Sheet</button>
            <button id="printBtn">Print / Save as PDF</button>
        </div>
    </div>

    <div id="canvas-container"></div>

    <script>
        const VF = Vex.Flow;

        function getStemDirection(pitch, octave, clef) {
            const noteNames = ['C', 'D', 'E', 'F', 'G', 'A', 'B'];
            const noteIndex = noteNames.indexOf(pitch[0].toUpperCase());
            const val = (octave * 7) + noteIndex;
            return (clef === 'treble' ? val >= 34 : val >= 22) ? VF.Stem.DOWN : VF.Stem.UP;
        }

        function parseNotation(text, clef) {
            const sections = text.split(',');
            const vexNotes = [];
            const durationMap = { 'w': 'w', 'h': 'h', 'q': 'q', '8': '8', '16': '16' };

            sections.forEach(item => {
                const cleanItem = item.trim();
                if (!cleanItem) return;

                if (cleanItem === 'bar.double') {
                    if (vexNotes.length > 0) vexNotes[vexNotes.length - 1].setEndBarline(VF.Barline.type.DOUBLE);
                } else if (cleanItem === 'bar.ritornello') {
                    if (vexNotes.length > 0) vexNotes[vexNotes.length - 1].setEndBarline(VF.Barline.type.REPEAT_END);
                } else if (cleanItem === 'bar.single' || cleanItem === '|') {
                    if (vexNotes.length > 0) vexNotes[vexNotes.length - 1].setEndBarline(VF.Barline.type.SINGLE);
                } else {
                    const match = cleanItem.match(/(\d+)\s+([A-Ga-g#b]+\d+)\s+([whq816]+)/);
                    if (match) {
                        const count = parseInt(match[1]);
                        const fullPitch = match[2];
                        const pitchName = fullPitch.match(/[A-Ga-g#b]+/)[0];
                        const octave = parseInt(fullPitch.match(/\d+/)[0]);
                        const dur = durationMap[match[3]] || 'q';
                        const key = fullPitch.replace(/([A-G][#b]?)/i, '$1/');

                        for (let i = 0; i < count; i++) {
                            const note = new VF.StaveNote({ 
                                keys: [key], duration: dur,
                                stem_direction: getStemDirection(pitchName, octave, clef)
                            });
                            
                            if (fullPitch.includes('#')) {
                                note.addModifier(new VF.Accidental('#'), 0);
                            } else if (fullPitch.toLowerCase().includes('b')) {
                                if (fullPitch[0].toUpperCase() !== 'B' || fullPitch.toLowerCase().startsWith('bb')) {
                                    note.addModifier(new VF.Accidental('b'), 0);
                                }
                            }
                            vexNotes.push(note);
                        }
                    }
                }
            });
            return vexNotes;
        }

        function render() {
            const container = document.getElementById('canvas-container');
            container.innerHTML = ''; 

            const clefValue = document.getElementById('clef').value;
            const keySig = document.getElementById('keySig').value;
            const timeSig = document.getElementById('timeSig').value;
            const notes = parseNotation(document.getElementById('notation').value, clefValue);

            const renderer = new VF.Renderer(container, VF.Renderer.Backends.SVG);
            const notesPerLine = 8; 
            const numLines = Math.ceil(notes.length / notesPerLine) || 1;
            
            renderer.resize(750, numLines * 150 + 50);
            const context = renderer.getContext();

            for (let i = 0; i < numLines; i++) {
                const lineNotes = notes.slice(i * notesPerLine, (i + 1) * notesPerLine);
                const x = 10;
                const y = 20 + (i * 150);
                const staveWidth = 700;

                const stave = new VF.Stave(x, y, staveWidth);
                stave.addClef(clefValue).addKeySignature(keySig);
                if (i === 0) stave.addTimeSignature(timeSig);
                stave.setContext(context).draw();

                if (lineNotes.length > 0) {
                    try {
                        const voice = new VF.Voice({ num_beats: 0, beat_value: 4 }).setStrict(false);
                        voice.addTickables(lineNotes);
                        new VF.Formatter().joinVoices([voice]).formatToStave([voice], stave);
                        voice.draw(context, stave);
                    } catch (e) { console.error("Render error:", e); }
                }
            }
        }

        // Função para inserir texto no final da área de notas com formatação correta
        function insertAtEnd(text) {
            const area = document.getElementById('notation');
            const currentVal = area.value.trim();
            // Adiciona vírgula se já houver conteúdo
            area.value = currentVal + (currentVal ? ", " : "") + text;
            render();
        }

        document.getElementById('addSingleBar').addEventListener('click', () => insertAtEnd('|'));
        document.getElementById('addDoubleBar').addEventListener('click', () => insertAtEnd('bar.double'));
        
        document.getElementById('renderBtn').addEventListener('click', render);
        document.getElementById('notation').addEventListener('input', render);
        document.getElementById('clef').addEventListener('change', render);
        document.getElementById('keySig').addEventListener('change', render);
        document.getElementById('timeSig').addEventListener('input', render);
        document.getElementById('printBtn').addEventListener('click', () => window.print());

        window.onload = render;
    </script>
</body>
</html>
